<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA MULTISPA — Чат</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Кнопка открытия чата -->
<div id="chat-toggle" class="chat-toggle" onclick="toggleChat()">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
    <span class="chat-badge" id="chat-badge" style="display:none">1</span>
</div>

<!-- Окно чата -->
<div id="chat-window" class="chat-window hidden">
    <!-- Заголовок -->
    <div class="chat-header">
        <div class="chat-header-info">
            <div class="chat-avatar"><img src="anna_avatar.png" alt="MULTISPA" width="42" height="42"></div>
            <div>
                <div class="chat-title">SIA «MULTISPA»</div>
                <div class="chat-subtitle" id="chat-status">Онлайн</div>
            </div>
        </div>
        <button class="chat-close" onclick="toggleChat()">✕</button>
    </div>

    <!-- Сообщения -->
    <div class="chat-messages" id="chat-messages">
        <!-- Сообщения добавляются динамически -->
    </div>

    <!-- Ввод -->
    <div class="chat-input-area">
        <input
            type="text"
            id="chat-input"
            class="chat-input"
            placeholder="Введите сообщение..."
            autocomplete="off"
            onkeydown="if(event.key==='Enter') sendMessage()"
        >
        <button class="chat-voice" onclick="toggleVoice()" id="chat-voice-btn" title="Голосовой ввод">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="mic-icon">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
        </button>
        <button class="chat-send" onclick="sendMessage()" id="chat-send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <!-- Powered by -->
    <div class="chat-footer">
        <a href="https://betonaveidni.lv" target="_blank">betonaveidni.lv</a>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="chat.js"></script>
</body>
</html>
